name: 📦 Publish to JSR
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/jsr-publish.yml'
      - 'src/**'
      - 'package.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          cache: 'npm'

      - run: rm package-lock.json
      - run: npm i

      - run: npm run build
      - run: npm run test

      - name: Create jsr.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cat > jsr.json << EOF
          {
            "name": "@evan-liu/karabiner-ts",
            "version": "$VERSION",
            "exports": "./src/index.ts",
            "include": ["src"]
          }
          EOF

      - name: Publish package
        run: npx jsr publish
